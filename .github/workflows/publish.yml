name: Publish to PyPI

# Token-free publishing via PyPI Trusted Publishing (OIDC). No API token/secret
# is stored in the repo. Fires when a GitHub Release is published (tag the commit
# and publish a Release), or run manually from the Actions tab.
#
# One-time setup on PyPI (project already exists, so add a Trusted Publisher):
#   https://pypi.org/manage/project/powermcp/settings/publishing/  ->  Add a new publisher
#     Owner:           Power-Agent
#     Repository:      PowerMCP
#     Workflow name:   publish.yml
#     Environment:     pypi
# Then create a GitHub environment named "pypi" (Settings -> Environments) — optionally
# with required reviewers — and bump `version` in pyproject.toml before each release.

on:
  release:
    types: [published]
  workflow_dispatch: {}

jobs:
  build:
    name: Build & validate distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
